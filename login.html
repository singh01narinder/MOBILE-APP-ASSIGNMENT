<!DOCTYPE html>
<html>
<head>
    <title>Login Screen</title>
    <style>
        body { font-family: Arial, sans-serif; background: #eef2f3; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .phone-wrapper { width: 360px; height: 740px; background: white; border: 12px solid #333; border-radius: 36px; box-shadow: 0px 10px 20px rgba(0,0,0,0.2); padding: 24px; box-sizing: border-box; display: flex; flex-direction: column; position: relative;}
        h2 { text-align: center; color: #333; margin-top: 60px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 14px; background: #007AFF; border: none; color: white; font-weight: bold; font-size: 16px; border-radius: 8px; cursor: pointer; margin-top: 15px; }
        .link { text-align: center; margin-top: 20px; font-size: 14px; }
        .link a { color: #007AFF; text-decoration: none; }
        .error-box { background: #FFD2D2; color: #D8000C; padding: 10px; border-radius: 8px; font-size: 13px; text-align: center; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div class="phone-wrapper">
        <h2>Login</h2>
        
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">
        
        <button onclick="triggerLoginError()">Log In</button>
        
        <div id="error" class="error-box">⚠️ Login Error: Invalid email or password!</div>
        
        <div class="link">Don't have an account? <a href="#">Sign up</a></div>
    </div>

    <script>
        function triggerLoginError() {
            document.getElementById('error').style.display = 'block';
        }
    </script>

</body>
</html>
